name: ecampusv2
version: 1.0.0+1
publish_to: none
description: A new Flutter project.
environment: 
  sdk: '>=3.0.0 <4.0.0'

dependencies: 
  cupertino_icons: ^1.0.2
  intl: ^0.20.2
  get: ^4.6.6
  get_storage:
  getwidget: ^7.0.0
  dio: ^5.6.0
  wave: ^0.2.2
  flutter_animator: ^3.2.2
  flutter_spinkit: ^5.1.0
  pretty_qr_code: ^3.3.0
  ai_barcode_scanner: ^7.1.0
  flex_color_scheme: ^8.2.0
  google_fonts: ^6.2.1
  convex_bottom_bar:
  font_awesome_flutter: ^10.5.0
  liquid_pull_to_refresh: ^3.0.1
  flutter_native_splash: ^2.3.1
  flutter_speed_dial: ^7.0.0
  pretty_animated_buttons: ^0.0.1
  introduction_screen: ^4.0.0
  socket_io_client: ^3.1.2
  carousel_slider: ^5.0.0
  pinput: ^6.0.1
  flutter: 
    sdk: flutter
  flutter_zoom_drawer: ^3.1.1
  rename: ^3.0.0

dev_dependencies: 
  flutter_lints: ^6.0.0
  flutter_test: 
    sdk: flutter
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo-ecampus.png"
  min_sdk_android: 20 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/logo-ecampus.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
  windows:
    generate: true
    image_path: "assets/logo-ecampus.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/logo-ecampus.png"

flutter_native_splash:
  color: "#ffffff"
  image: assets/logo-ecampus.png
  branding: 
  color_dark: "#121212"
  image_dark: assets/logo-ecampus.png

  android_12:
    image: assets/logo-ecampus.png
    icon_background_color: "#ffffff"
    image_dark: assets/logo-ecampus.png
    icon_background_color_dark: "#121212"

  web: false

flutter: 
  uses-material-design: true

  assets:
    - assets/
